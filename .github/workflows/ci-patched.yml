name: CI Patched

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

concurrency:
  group: ci-patched-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, node-${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node: [20.x]
    env:
      # Per-job Verdaccio port to avoid collisions when matrix runs in parallel
      VERDACCIO_PORT: 4874
      # Opt into Node.js 24 for JavaScript actions to silence deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Use runner temp dir for cross-platform screenshots
      SCREENSHOT_DIR: ${{ runner.temp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node for actions
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Ensure Verdaccio port is free (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $port = [int]$env:VERDACCIO_PORT
          $conn = Get-NetTCPConnection -LocalPort $port -ErrorAction SilentlyContinue
          if ($conn) {
            Write-Host "Port $port in use by PID $($conn.OwningProcess). Killing..."
            Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 1
          } else {
            Write-Host "Port $port is free."
          }

      - name: Ensure Verdaccio port is free (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          p=$(lsof -t -i:$VERDACCIO_PORT || true)
          if [ -n "$p" ]; then
            echo "Killing process on port $VERDACCIO_PORT: $p"
            kill -9 $p || true
            sleep 1
          else
            echo "Port $VERDACCIO_PORT is free."
          fi

      - name: Download and extract verdaccio storage artifact
        uses: actions/download-artifact@v4
        with:
          name: verdaccio-storage
          path: ${{ runner.temp }}/verdaccio-download

      - name: Install Verdaccio and helpers
        shell: bash
        run: |
          npm install -g verdaccio wait-on jq || true

      - name: Prepare Verdaccio config
        shell: bash
        run: |
          mkdir -p $HOME/.config/verdaccio
          cp ./.github/workflows/verdaccio/config.yaml $HOME/.config/verdaccio/config.yaml || true
          sed -i.bak "s/4873/${VERDACCIO_PORT}/g" $HOME/.config/verdaccio/config.yaml || true
          tar -xzf ${{ runner.temp }}/verdaccio-download/verdaccio-storage.tar.gz -C $HOME/.config/verdaccio || true

      - name: Start Verdaccio (background) and wait for ready
        shell: bash
        run: |
          nohup verdaccio --config $HOME/.config/verdaccio/config.yaml --listen 0.0.0.0:${VERDACCIO_PORT} > $HOME/.config/verdaccio/verdaccio.log 2>&1 &
          npx wait-on --timeout 60000 http://localhost:${VERDACCIO_PORT} || (cat $HOME/.config/verdaccio/verdaccio.log && exit 1)
          echo "Verdaccio started on port ${VERDACCIO_PORT}"

      - name: Configure npm to use local registry
        shell: bash
        run: |
          npm set registry http://localhost:${VERDACCIO_PORT}
          npm config get registry

      - name: Create Verdaccio user (handle 409 gracefully)
        shell: bash
        run: |
          set -e
          TOKEN_RES=$(curl -s -XPUT -H "Content-type: application/json" -d '{ "name": "test", "password": "test" }' "http://localhost:${VERDACCIO_PORT}/-/user/org.couchdb.user:test" || true)
          TOKEN=$(echo "$TOKEN_RES" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            TOKEN_RES=$(curl -s -XPOST -H "Content-type: application/json" -d '{ "name": "test", "password": "test" }' "http://localhost:${VERDACCIO_PORT}/-/user/org.couchdb.user:test/_login" || true)
            TOKEN=$(echo "$TOKEN_RES" | jq -r '.token // empty')
          fi
          if [ -z "$TOKEN" ]; then
            echo "Warning: could not obtain Verdaccio token; continuing without auth."
          else
            npm set //localhost:${VERDACCIO_PORT}/:_authToken "$TOKEN"
          fi

      - name: Install dependencies (robust)
        shell: bash
        run: |
          npm ci --prefer-offline --no-audit --progress=false || \
          (sleep 5 && npm ci --prefer-offline --no-audit --progress=false) || \
          (sleep 10 && npm ci --prefer-offline --no-audit --progress=false)

      - name: Create Vendure test app (with retries)
        shell: bash
        run: |
          for i in 1 2 3; do
            npx @vendure/create@ci test-app --ci --use-npm --log-level info && break || {
              echo "npx @vendure/create failed (attempt $i). Retrying..."
              sleep $((i * 5))
            }
          done

      - name: Run tests
        shell: bash
        run: |
          export DASHBOARD_SCREENSHOT_DIR="${SCREENSHOT_DIR}"
          # Replace the following with your actual test command
          npm test -- --output=${DASHBOARD_SCREENSHOT_DIR} || true

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-test-screenshots-${{ matrix.os }}-${{ matrix.node }}
          path: ${{ env.SCREENSHOT_DIR }}/dashboard-test-*.png
          if-no-files-found: warn

      - name: Post job cleanup
        if: always()
        shell: bash
        run: |
          npm set registry https://registry.npmjs.org/
          p=$(lsof -t -i:${VERDACCIO_PORT} || true)
          if [ -n "$p" ]; then kill -9 $p || true; fi
