name: Build & Test

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - minor
      - major
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - master
      - major
      - minor
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Codegen
  codegen:
    uses: ./.github/workflows/codegen.yml

  # Build
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build
        run: npm run build

  # Unit tests
  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      - name: Build
        run: npx lerna run ci
      - name: Unit tests
        run: npm run test

  # Check dashboard changes
  dashboard-changes:
    name: check dashboard changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for dashboard changes
        id: check
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then base="${{ github.event.before }}"; fi
          if [ -z "$base" ]; then base="HEAD~1"; fi
          if git diff --name-only "$base" HEAD | grep -q '^packages/dashboard/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"

  # Dashboard e2e
  dashboard-e2e:
    name: dashboard e2e
    needs: dashboard-changes
    if: needs.dashboard-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build
        run: npx lerna run ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: packages/dashboard
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium
        working-directory: packages/dashboard
      - name: Dashboard e2e tests
        run: npm run e2e:pw
        working-directory: packages/dashboard

  # SonarQube
  sonarqube:
    name: SonarQube
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # DRY e2e jobs
  e2e:
    name: e2e tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        db: [sqljs, mariadb, mysql, postgres]
        node: ${{ github.event_name == 'pull_request' && fromJSON('["22.x"]') || fromJSON('["20.x","22.x","24.x"]') }}
    services:
      sqljs:
        elastic:
          image: docker.elastic.co/elasticsearch/elasticsearch:7.1.1
          env:
            discovery.type: single-node
            bootstrap.memory_lock: true
            ES_JAVA_OPTS: -Xms512m -Xmx512m
            cluster.routing.allocation.disk.watermark.low: 500mb
            cluster.routing.allocation.disk.watermark.high: 200mb
            cluster.routing.allocation.disk.watermark.flood_stage: 100mb
          ports: ["9200"]
          options: >-
            --health-cmd="curl --silent --fail localhost:9200/_cluster/health"
            --health-interval=10s --health-timeout=5s --health-retries=3
        redis:
          image: redis:7.4.1
          ports: ["6379"]
      mariadb:
        mariadb:
          image: mariadb:11.5
          env:
            MARIADB_ROOT_PASSWORD: password
          ports: ["3306"]
          options: >-
            --health-cmd="mariadb-admin ping -h localhost -u vendure -ppassword"
            --health-interval=10s --health-timeout=5s --health-retries=3
        elastic:
          image: docker.elastic.co/elasticsearch/elasticsearch:7.1.1
          env:
            discovery.type: single-node
            bootstrap.memory_lock: true
            ES_JAVA_OPTS: -Xms512m -Xmx512m
            cluster.routing.allocation.disk.watermark.low: 500mb
            cluster.routing.allocation.disk.watermark.high: 200mb
            cluster.routing.allocation.disk.watermark.flood_stage: 100mb
          ports: ["9200"]
          options: >-
            --health-cmd="curl --silent --fail localhost:9200/_cluster/health"
            --health-interval=10s --health-timeout=5s --health-retries=3
        redis:
          image: redis:7.4.1
          ports: ["6379"]
      mysql:
        mysql:
          image: vendure/mysql-8-native-auth:latest
          env:
            MYSQL_ROOT_PASSWORD: password
          ports: ["3306"]
          options: >-
            --health-cmd="mysqladmin ping --silent"
            --health-interval=10s --health-timeout=20s --health-retries=10
        elastic:
          image: docker.elastic.co/elasticsearch/elasticsearch:7.1.1
          env:
            discovery.type: single-node
            bootstrap.memory_lock: true
            ES_JAVA_OPTS: -Xms512m -Xmx512m
            cluster.routing.allocation.disk.watermark.low: 500mb
            cluster.routing.allocation.disk.watermark.high: 200mb
            cluster.routing.allocation.disk.watermark.flood_stage: 100mb
          ports: ["9200"]
          options: >-
            --health-cmd="curl --silent --fail localhost:9200/_cluster/health"
            --health-interval=10s --health-timeout=5s --health-retries=3
        redis:
          image: redis:7.4.1
          ports: ["6379"]
      postgres:
        postgres:
          image: postgres:16
          env:
            POSTGRES_USER: vendure
            POSTGRES_PASSWORD: password
          ports: ["5432"]
          options: >-
            --health-cmd=pg_isready
            --health-interval=10s --health-timeout=5s
            --health-retries=3
        elastic:
          image: docker.elastic.co/elasticsearch/elasticsearch:7.1.1
          env:
            discovery.type: single-node
            bootstrap.memory_lock: true
            ES_JAVA_OPTS: -Xms512m -Xmx512m
            cluster.routing.allocation.disk.watermark.low: 500mb
            cluster.routing.allocation.disk.watermark.high: 200mb
            cluster.routing.allocation.disk.watermark.flood_stage: 100mb
          ports: ["9200"]
          options: >-
            --health-cmd="curl --silent --fail localhost:9200/_cluster/health"
            --health-interval=10s --health-timeout=5s --health-retries=3
        redis:
          image: redis:7.4.1
          ports: ["6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      - name: Build
        run: npx lerna run ci
      - name: e2e tests
        env:
          E2E_ELASTIC_PORT: ${{ job.services[matrix.db].elastic.ports['9200'] }}
          E2E_REDIS_PORT: ${{ job.services[matrix.db].redis.ports['6379'] }}
          E2E_MARIADB_PORT: ${{ matrix.db == 'mariadb' && job.services.mariadb.mariadb.ports['3306'] || '' }}
          E2E_MYSQL_PORT: ${{ matrix.db == 'mysql' && job.services.mysql.mysql.ports['3306'] || '' }}
          E2E_POSTGRES_PORT: ${{ matrix.db == 'postgres' && job.services.postgres.postgres.ports['5432'] || '' }}
          DB: ${{ matrix.db }}
        run: npm run e2e
