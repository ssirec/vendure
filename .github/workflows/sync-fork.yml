name: Sync Fork
on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: TGitHub/github-sync-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          owner: vendurehq
          repo: vendure
